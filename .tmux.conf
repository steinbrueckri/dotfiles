# Terminal multiplexer
# https://github.com/tmux/tmux

################################################################################
## TPM
################################################################################

# bootstrap tpm-redux
if-shell '[ ! -d "$HOME/.tmux/plugins/tpm-redux" ]' \
  'run-shell "git clone https://github.com/RyanMacG/tpm-redux $HOME/.tmux/plugins/tpm-redux"' \
  ''

# install plugins
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'jaclu/tmux-power-zoom'
set -g @plugin 'rickstaa/tmux-notify'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'Morantron/tmux-fingers'

################################################################################
# Theme settings
################################################################################

set -g @rose_pine_variant 'dawn'

set -g @rose_pine_user 'off' # Turn on the username component in the statusbar
set -g @rose_pine_host 'off' # Enables hostname in the status bar
set -g @rose_pine_date_time '%H:%M | %d.%m.%y' # It accepts the date UNIX command format (man date for info)
set -g @rose_pine_default_window_behavior 'on' # Forces tmux default window list behaviour
set -g @rose_pine_disable_active_window_menu 'on' # Forces tmux to show the current running program as window name
set -g @rose_pine_show_current_program 'off' # Forces tmux to show the current running program as window name
set -g @rose_pine_show_pane_directory 'on' # Forces tmux to show the current directory as window name
set -g @rose_pine_left_separator ' ÔÖł ' # The strings to use as separators are 1-space padded
set -g @rose_pine_right_separator ' ÔĀŹ ' # Accepts both normal chars & nerdfont icons
set -g @rose_pine_field_separator ' | ' # Again, 1-space padding, it updates with prefix + I
set -g @rose_pine_window_separator ' ÔĀŹ ' # Replaces the default `:` between the window number and name
set -g @rose_pine_session_icon 'Ó≠Ņ  ůįúī' # Changes the default icon to the left of the session name
set -g @rose_pine_current_window_icon 'Ó¨£' # Changes the default icon to the left of the active window name
set -g @rose_pine_folder_icon 'Ôźď' # Changes the default icon to the left of the current directory folder
set -g @rose_pine_username_icon 'ÔÄá' # Changes the default icon to the right of the hostname
set -g @rose_pine_hostname_icon 'ůįíč' # Changes the default icon to the right of the hostname
set -g @rose_pine_date_time_icon 'ůįÉį' # Changes the default icon to the right of the date module
set -g @rose_pine_window_status_separator " - " # Changes the default icon that appears between window names

### Battery colors
set -g @batt_color_charge_primary_tier8 '#9ccfd8'  # foam
set -g @batt_color_charge_primary_tier7 '#9ccfd8'
set -g @batt_color_charge_primary_tier6 '#f6c177'  # gold
set -g @batt_color_charge_primary_tier5 '#f6c177'
set -g @batt_color_charge_primary_tier4 '#ebbcba'  # rose
set -g @batt_color_charge_primary_tier3 '#eb6f92'  # love
set -g @batt_color_charge_primary_tier2 '#eb6f92'
set -g @batt_color_charge_primary_tier1 '#eb6f92'

### Custom status line
set -g @rose_pine_status_right_append_section ''
set -g @rose_pine_status_left_prepend_section ''
set -g @rose_pine_status_left_append_section ''
set -g @rose_pine_status_right_append_section ''
set -g @rose_pine_status_right_prepend_section '#{battery_color_charge_fg}#{battery_icon} #{battery_percentage}#{battery_remain}#[default] | '

### Finger's
set -g @fingers-key V
set -g @fingers-backdrop-style 'fg=#908caa,bg=default'

################################################################################
# twm settings
################################################################################

# Rose Pine-ish popup styling
set -g popup-style        "bg=#1f1d2e,fg=#e0def4"
set -g popup-border-style "fg=#c4a7e7,bg=#1f1d2e"   # iris border
set -g message-style      "bg=#26233a,fg=#e0def4"
set -g message-command-style "bg=#26233a,fg=#9ccfd8"

# sesh
bind s display-popup -h 90% -w 50% -E "sesh picker -i"
bind h switch-client -t "default"

################################################################################
# tmux-notify
################################################################################

# tmux-notify is very naive and just checks to see if the current pane ends in
# the suffix (note: I think they meant prefix) configured here. So, since I'm
# using a special character, I need to set it here.
set -g @tnotify-prompt-suffixes 'ůĪě™'
set -g @tnotify-sleep-duration '5'

################################################################################
# general settings
################################################################################

set-option -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -g renumber-windows on
set-option -sg escape-time 10
set-option -g focus-events on
set -g set-titles on
set -g set-titles-string "#W/#T"
set -g mouse on # Enable mouse mode (tmux 2.1 and above)
set -g set-clipboard on
set -g base-index 1 # Start windows and panes at 1, not 0
setw -g pane-base-index 1 # Start windows and panes at 1, not 0
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none
set -g status-position top
set -g status-justify left
set -g allow-passthrough on
set -g detach-on-destroy off  # don't exit from tmux when closing a session

################################################################################
# Key bindings
################################################################################

unbind l
unbind p
unbind n

# remap prefix from 'C-b' to 'C-a' like in screen
unbind C-b
set-option -g prefix C-a
# leader
bind-key C-a send-prefix

# split panes using _ and -
bind _ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# unbind default marker key
unbind m

# create new window
bind C new

# sync input
bind-key y set-window-option synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

# enter copy mode
bind-key v copy-mode
# past
bind-key p paste-buffer

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf\; display-message "Reload config! ūüĒĀ"

# copy with mouse on osx
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

################################################################################
# TPM load
################################################################################

run '~/.tmux/plugins/tpm-redux/tpm' # always at end of file
